<div class="page-container">

  <!-- Header -->
  <div class="page-header">
    <div>
      <h2>Categories</h2>
      <span class="subtitle">Manage product categories</span>
    </div>
    <button mat-raised-button color="primary" (click)="openCreate()">
      <mat-icon>add</mat-icon> New Category
    </button>
  </div>

  <!-- Form Panel -->
  <mat-card class="form-card" *ngIf="showForm">
    <mat-card-header>
      <mat-card-title>
        {{ editingId ? 'Edit Category' : 'Create Category' }}
      </mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="form-row">

        <mat-form-field appearance="outline" class="name-field">
          <mat-label>Category Name</mat-label>
          <input matInput formControlName="name" placeholder="e.g. Electronics" />
          <mat-icon matSuffix>label</mat-icon>
          <mat-error *ngIf="form.get('name')?.hasError('required')">
            Name is required
          </mat-error>
          <mat-error *ngIf="form.get('name')?.hasError('minlength')">
            Min 2 characters
          </mat-error>
        </mat-form-field>

        <div class="form-actions">
          <button mat-stroked-button type="button" (click)="cancelForm()">
            <mat-icon>close</mat-icon> Cancel
          </button>
          <button mat-raised-button color="primary"
                  type="submit"
                  [disabled]="form.invalid">
            <mat-icon>{{ editingId ? 'save' : 'add' }}</mat-icon>
            {{ editingId ? 'Update' : 'Create' }}
          </button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>

  <!-- Table -->
  <mat-card class="table-card">
    <mat-card-content>

      <div *ngIf="loading" class="loading-center">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <table mat-table [dataSource]="categories"
             class="full-width mat-elevation-z0"
             *ngIf="!loading">

        <!-- ID -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let c">
            <span class="id-badge">{{ c.id }}</span>
          </td>
        </ng-container>

        <!-- Name -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let c">
            <div class="category-name">
              <mat-icon class="cat-icon">label</mat-icon>
              <strong>{{ c.name }}</strong>
            </div>
          </td>
        </ng-container>

        <!-- Actions -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let c">
            <button mat-icon-button color="primary"
                    (click)="openEdit(c)"
                    matTooltip="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn"
                    (click)="delete(c.id)"
                    matTooltip="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"
            class="table-row"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell empty-state" colspan="3">
            <mat-icon>category</mat-icon>
            <span>No categories found</span>
          </td>
        </tr>

      </table>
    </mat-card-content>
  </mat-card>

</div>
