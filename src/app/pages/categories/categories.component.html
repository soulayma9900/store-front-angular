<div class="page-container">

  <!-- HEADER -->
  <div class="page-header">
    <div>
      <h2>Categories</h2>
      <span class="subtitle">Manage product categories</span>
    </div>

    <!-- ⭐ ADD BUTTON (RESTORED) -->
    <button mat-raised-button color="primary" (click)="openCreate()">
      <mat-icon>add</mat-icon>
      New Category
    </button>
  </div>

  <!-- FORM -->
  <mat-card class="form-card" *ngIf="showForm">

    <mat-card-header>
      <mat-card-title>
        {{ editingId ? 'Edit Category' : 'Create Category' }}
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>

      <form [formGroup]="form" (ngSubmit)="submit()" class="form-row">

        <mat-form-field appearance="outline">
          <mat-label>Category Name</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>

        <div class="form-actions">

          <button mat-stroked-button type="button" (click)="cancelForm()">
            Cancel
          </button>

          <button mat-raised-button color="primary"
                  type="submit"
                  [disabled]="form.invalid">

            {{ editingId ? 'Update' : 'Create' }}

          </button>

        </div>

      </form>

    </mat-card-content>
  </mat-card>

  <!-- TABLE -->
  <mat-card class="table-card">

    <mat-card-content>

      <div *ngIf="loading" class="loading-center">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <table mat-table
             [dataSource]="pagedCategories"
             *ngIf="!loading"
             class="full-width mat-elevation-z0">

        <!-- ID -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let c">
            <span class="id-badge">{{ c.id }}</span>
          </td>
        </ng-container>

        <!-- NAME -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let c">
            <strong>{{ c.name }}</strong>
          </td>
        </ng-container>

        <!-- ACTIONS -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let c">

            <button mat-icon-button color="primary"
                    (click)="openEdit(c)">
              <mat-icon>edit</mat-icon>
            </button>

            <button mat-icon-button color="warn"
                    (click)="delete(c.id)">
              <mat-icon>delete</mat-icon>
            </button>

          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>

      <!-- PAGINATION -->
      <div class="pagination" style="margin-top:15px; text-align:center">

        <button mat-button (click)="onPageChange(currentPage - 1)"
                [disabled]="currentPage === 1">
          ◀
        </button>

        <button mat-button
                *ngFor="let p of [].constructor(totalPages); let i = index"
                (click)="onPageChange(i + 1)"
                [class.active]="currentPage === i + 1">
          {{ i + 1 }}
        </button>

        <button mat-button (click)="onPageChange(currentPage + 1)"
                [disabled]="currentPage === totalPages">
          ▶
        </button>

      </div>

    </mat-card-content>

  </mat-card>

</div>
