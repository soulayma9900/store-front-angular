<div class="page-container">

  <div class="page-header">
    <div>
      <h2>Suppliers</h2>
      <span class="subtitle">Manage suppliers</span>
    </div>
    <button mat-raised-button color="primary" (click)="openCreate()">
      <mat-icon>add</mat-icon> New Supplier
    </button>
  </div>

  <mat-card class="form-card" *ngIf="showForm">
    <mat-card-header>
      <mat-card-title>{{ editingId ? 'Edit Supplier' : 'Create Supplier' }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">

        <mat-form-field appearance="outline">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" />
          <mat-error *ngIf="form.get('name')?.hasError('required')">Name is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Phone</mat-label>
          <input matInput formControlName="phone" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Address</mat-label>
          <input matInput formControlName="address" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-col">
          <mat-label>Notes</mat-label>
          <textarea matInput rows="3" formControlName="notes"></textarea>
        </mat-form-field>

        <div class="form-actions full-col">
          <button mat-stroked-button type="button" (click)="cancelForm()">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">{{ editingId ? 'Update' :
            'Create' }}</button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>

  <mat-card class="table-card">
    <mat-card-content>
      <div *ngIf="loading" class="loading-center">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <table mat-table [dataSource]="suppliers" class="full-width mat-elevation-z0" *ngIf="!loading">

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let s"><span class="id-badge">{{ s.id }}</span></td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let s"><strong>{{ s.name }}</strong></td>
        </ng-container>

        <ng-container matColumnDef="phone">
          <th mat-header-cell *matHeaderCellDef>Phone</th>
          <td mat-cell *matCellDef="let s">{{ s.phone }}</td>
        </ng-container>

        <ng-container matColumnDef="address">
          <th mat-header-cell *matHeaderCellDef>Address</th>
          <td mat-cell *matCellDef="let s">{{ s.address }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let s">
            <button mat-icon-button color="primary" (click)="openEdit(s)"><mat-icon>edit</mat-icon></button>
            <button mat-icon-button color="warn" (click)="delete(s.id)"><mat-icon>delete</mat-icon></button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell empty-state" colspan="5">
            <mat-icon>people</mat-icon>
            <span>No suppliers found</span>
          </td>
        </tr>

      </table>
    </mat-card-content>
  </mat-card>

</div>
