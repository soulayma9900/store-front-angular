<div class="pagination">

  <button (click)="changePage(currentPage - 1)"
          [disabled]="currentPage === 1">
    Prev
  </button>

  <button *ngFor="let page of pages"
          (click)="changePage(page)"
          [class.active]="page === currentPage">
    {{ page }}
  </button>

  <button (click)="changePage(currentPage + 1)"
          [disabled]="currentPage === pages.length">
    Next
  </button>

</div>
